<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#0B1020"/>
  <text x="60" y="80" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">CPQ naming map</text>
  <text x="60" y="116" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">Separate the moving upstream, the chosen base, and the current downstream realization.</text>

  <rect x="60" y="180" width="300" height="120" rx="18" fill="#172554" stroke="#60A5FA" stroke-width="2"/>
  <text x="85" y="225" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">upstream-main</text>
  <text x="85" y="262" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="18">The upstream moving mainline.</text>

  <rect x="450" y="180" width="300" height="120" rx="18" fill="#3F2A07" stroke="#FBBF24" stroke-width="2"/>
  <text x="475" y="225" fill="#FEF3C7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">cpq-base</text>
  <text x="475" y="262" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="18">Pinned upstream anchor commit or tag.</text>

  <rect x="840" y="180" width="300" height="120" rx="18" fill="#3F1D2E" stroke="#F472B6" stroke-width="2"/>
  <text x="865" y="225" fill="#FCE7F3" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">cpq-head</text>
  <text x="865" y="262" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="18">Pointer to the current top of the full CPQ stack.</text>

  <path d="M360 240H430" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
  <path d="M430 240L415 230M430 240L415 250" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="368" y="220" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="16">pick a base from upstream</text>

  <path d="M750 240H820" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>
  <path d="M820 240L805 230M820 240L805 250" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="764" y="220" fill="#FCD34D" font-family="Inter, Arial, sans-serif" font-size="16">replay CPQ onto the base</text>

  <rect x="120" y="410" width="960" height="220" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="160" y="462" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Relationship in the finalized state</text>
  <text x="160" y="502" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">cpq-head → cpq-capstone</text>
  <text x="160" y="538" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">local-main = local realization of cpq-head</text>
  <text x="160" y="574" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">distro-main = remote realization of cpq-head</text>
  <text x="160" y="610" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">In a healthy, finalized downstream: local-main = distro-main = cpq-head, while upstream-main keeps moving independently.</text>
</svg>
